name: Auto Build and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'resume.tex'

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF from LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: resume.tex

      - name: Check resume is exactly one page
        run: |
          sudo apt-get install -y poppler-utils -qq
          PAGE_COUNT=$(pdfinfo resume.pdf | grep "Pages:" | awk '{print $2}')
          echo "Page count: $PAGE_COUNT"
          if [ "$PAGE_COUNT" -ne 1 ]; then
            echo "ERROR: resume.pdf has $PAGE_COUNT pages, expected 1."
            exit 1
          fi

      - name: Compute release tag and title
        id: tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const headCommit = context.payload.head_commit;
            const fullMsg = headCommit ? headCommit.message || "" : "";
            const title = (fullMsg.split("\n")[0] || "").trim() || "New release";

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100
            });

            const tagNums = releases
              .map(r => r.tag_name)
              .map(t => {
                const m = /^v0\.0\.(\d+)$/.exec(t || "");
                return m ? parseInt(m[1], 10) : null;
              })
              .filter(n => Number.isInteger(n));

            const nextNum = (tagNums.length ? Math.max(...tagNums) : 0) + 1;
            const nextTag = `v0.0.${nextNum}`;
            const sha = context.sha;

            async function ensureTag(baseTag, attempt = 0) {
              const candidate = attempt === 0 ? baseTag : `v0.0.${nextNum + attempt}`;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `tags/${candidate}` });
                return ensureTag(baseTag, attempt + 1);
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.git.createRef({
                    owner, repo,
                    ref: `refs/tags/${candidate}`,
                    sha
                  });
                  return candidate;
                }
                throw e;
              }
            }

            const finalTag = await ensureTag(nextTag);
            core.info(`Created tag ${finalTag} with title "${title}"`);
            return { tag_name: finalTag, title };

      - name: Rename PDF for release
        run: cp resume.pdf ${{ github.actor }}_resume.pdf

      - name: Create release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ fromJson(steps.tag.outputs.result).tag_name }}
          name: ${{ fromJson(steps.tag.outputs.result).title }}
          generate_release_notes: true
          files: ${{ github.actor }}_resume.pdf
